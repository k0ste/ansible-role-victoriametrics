---
- name: "victoriametrics | Restart vminsert"
  ansible.builtin.systemd:
    name: "vminsert"
    daemon_reload: "yes"
    state: "restarted"
  listen: "Restart vminsert"
  when:
    - "lookup('ansible.builtin.vars', 'victoriametrics', default='')
      not in ['', [], '[]', None]"
    - "lookup('ansible.builtin.vars', 'victoriametrics') |
       community.general.json_query(lookup('ansible.builtin.vars',
      'victoriametrics_service_restart_vminsert', default='')) == 'true'"
  vars:
    victoriametrics_service_restart_vminsert:
      "[].restart[] | map(&vminsert || 'false', @) | [0]"
