---
- name: "victoriametrics | Install the required packages in Redhat derivatives"
  when:
    - "hostvars[inventory_hostname]['ansible_facts']['os_family'] == 'RedHat'"
  block:
    - name: "victoriametrics | Update dnf cache"
      ansible.builtin.dnf:
        update_cache: "yes"
    - name: "victoriametrics | Install package with dnf"
      ansible.builtin.dnf:
        name: "{{ lookup('ansible.builtin.vars', 'victoriametrics_package') }}"
        state: "{{ lookup('ansible.builtin.vars',
          'victoriametrics_package_state') }}"
- name: "victoriametrics | Install the required packages in Debian derivatives"
  when:
    - "hostvars[inventory_hostname]['ansible_facts']['os_family'] == 'Debian'"
  block:
    - name: "victoriametrics | Update apt cache"
      ansible.builtin.apt:
        update_cache: "yes"
    - name: "victoriametrics | Install package with apt"
      ansible.builtin.apt:
        name: "{{ lookup('ansible.builtin.vars', 'victoriametrics_package') }}"
        state: "{{ lookup('ansible.builtin.vars',
          'victoriametrics_package_state') }}"
- name: "victoriametrics | Install the required packages in ArchLinux derivatives"
  when:
    - "hostvars[inventory_hostname]['ansible_facts']['os_family'] ==
      'Archlinux'"
  block:
    - name: "victoriametrics | Update pacman cache"
      community.general.pacman:
        update_cache: "yes"
    - name: "victoriametrics | Install package with pacman"
      community.general.pacman:
        name: "{{ lookup('ansible.builtin.vars', 'victoriametrics_package') }}"
        state: "{{ lookup('ansible.builtin.vars',
          'victoriametrics_package_state') }}"
