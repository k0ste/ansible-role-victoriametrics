---
- name: "victoriametrics | Deploy vmauth configuration"
  ansible.builtin.template:
    src: "vmauth.j2"
    dest: "{{ lookup('ansible.builtin.vars', 'victoriametrics_options_dest') +
      '/vmauth' }}"
    owner: "root"
    group: "root"
    mode: "0644"
  notify:
    - "Restart vmauth"
- name: "victoriametrics | Deploy vmauth backends configuration"
  ansible.builtin.template:
    src: "vmauth.yaml.j2"
    dest: "{{ lookup('ansible.builtin.vars', 'victoriametrics_conf_dest') +
      '/vmauth.yml' }}"
    owner: "root"
    group: "root"
    mode: "0644"
    validate: "vmauth --dryRun --auth.config %s"
  when:
    - "lookup('ansible.builtin.vars',
      'victoriametrics_vmauth_instance_settings', default='')
      not in ['', [], '[]', None]"
  notify:
    - "Reload vmauth"
- name: "victoriametrics | Enable vmauth service"
  ansible.builtin.systemd:
    name: "vmauth"
    enabled: "yes"
  when:
    - "lookup('ansible.builtin.vars', 'victoriametrics', default='')
      not in ['', [], '[]', None]"
    - "lookup('ansible.builtin.vars', 'victoriametrics') |
       community.general.json_query(lookup('ansible.builtin.vars',
      'victoriametrics_service_enable_vmauth', default='')) == 'true'"
  vars:
    victoriametrics_service_enable_vmauth:
      "[].enable[] | map(&vmauth || 'false', @) | [0]"
