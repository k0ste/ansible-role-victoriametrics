---
- name: "victoriametrics | Include pre requisite tasks"
  ansible.builtin.import_tasks:
    file: "pre_requisite.yml"
- name: "victoriametrics | Include packages tasks"
  ansible.builtin.include_tasks:
    file: "packages.yml"
  when:
    - "lookup('ansible.builtin.vars', 'victoriametrics', default='')
      not in ['', [], '[]', None]"
    - "lookup('ansible.builtin.vars', 'victoriametrics') |
       community.general.json_query(lookup('ansible.builtin.vars',
      'victoriametrics_install_package', default='')) == 'true'"
  vars:
    victoriametrics_install_package: "[] | map(&install_package || 'false', @) |
      [0]"
- name: "victoriametrics | Include deployment tasks"
  ansible.builtin.import_tasks:
    file: "deploy.yml"
